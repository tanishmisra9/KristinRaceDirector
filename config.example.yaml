# KristinRaceDirector - Example configuration
# Copy to config.yaml and customize.
# For OpenF1 live data: set OPENF1_USERNAME and OPENF1_PASSWORD env vars,
# or use config.local.yaml (gitignored) with your credentials.

openf1:
  base_url: "https://api.openf1.org/v1"
  username: ""
  password: ""
  poll_interval_sec: 4.0
  request_timeout_sec: 5.0

multiviewer:
  uri: "http://localhost:10101/api/graphql"
  player_ids: []
  # num_windows: auto-detects from open player windows. Set explicitly to override.

scoring_weights:
  interval_ahead: 1.0
  interval_behind: 0.7
  closing_trend: 0.8
  proximity_cluster: 0.5
  overtake_recency: 3.0
  pit_exit_traffic: 0.8
  race_control_event: 1.0
  position_importance: 1.5
  anti_churn_penalty: -0.6
  on_screen_retention: 0.4
  overtake_mode_attack: 0.8
  position_gain: 2.0
  prolonged_battle: 0.7
  session_phase: 1.5
  defending_bonus: 0.6
  incident_recovery: 2.0
  screen_time_penalty: -1.0
  stale_battle_penalty: -0.8

scoring_params:
  interval_sigmoid_midpoint_sec: 1.5
  interval_sigmoid_steepness: 3.0
  trend_window_samples: 8
  overtake_decay_seconds: 30.0
  pit_exit_window_seconds: 45.0
  proximity_radius_units: 500
  prolonged_battle_midpoint_sec: 45.0
  position_gain_max: 10
  incident_recovery_window_sec: 60.0
  screen_time_penalty_midpoint_sec: 60.0
  screen_time_penalty_steepness: 0.08

hysteresis:
  min_dwell_seconds: 12
  swap_improvement_threshold: 0.15
  swap_improvement_ratio: 0.15
  max_switches_per_cycle: 1
  max_switches_per_minute: 6
  removal_cooldown_seconds: 25
  sprint_min_dwell_seconds: 8

sticky_slots:
  - slot: 0
    driver: null
  - slot: 1
    driver: null

orchestrator:
  tick_interval_sec: 5.0
  dry_run: false
  manual_override_file: "/tmp/race_director_pause"
  startup_grace_ticks: 1
  watchdog_timeout_sec: 60.0

logging:
  level: "INFO"
  format: "console"
  file: null
