# KristenRaceDirector - Example configuration
# Copy to config.yaml and customize.
# For OpenF1 live data: set OPENF1_USERNAME and OPENF1_PASSWORD env vars,
# or use config.local.yaml (gitignored) with your credentials.

openf1:
  base_url: "https://api.openf1.org/v1"
  username: ""
  password: ""
  use_mqtt: false
  poll_interval_sec: 4.0
  request_timeout_sec: 5.0

multiviewer:
  uri: "http://localhost:10101/api/graphql"
  player_ids: []
  sync_delay_sec: 1.2  # Wait before syncing new player to main broadcast
  sync_strategy: "global_fallback"
  # num_windows: auto-detects from open player windows. Set explicitly to override.

scoring_weights:
  interval_ahead: 0.8
  interval_behind: 0.6
  closing_trend: 0.8
  proximity_cluster: 0.5
  overtake_recency: 3.0
  pit_exit_traffic: 0.8
  race_control_event: 1.5
  position_importance: 1.5
  anti_churn_penalty: -0.2
  on_screen_retention: 0.2
  overtake_mode_attack: 1.0
  position_gain: 2.0
  prolonged_battle: 1.2
  session_phase: 1.5
  defending_bonus: 1.0
  incident_recovery: 2.0
  screen_time_penalty: -1.0

scoring_params:
  interval_sigmoid_midpoint_sec: 1.0
  interval_sigmoid_steepness: 4.0
  trend_window_samples: 5
  overtake_decay_seconds: 30.0
  pit_exit_window_seconds: 30.0
  proximity_radius_units: 500
  prolonged_battle_midpoint_sec: 30.0
  position_gain_max: 8
  incident_recovery_window_sec: 45.0
  screen_time_penalty_midpoint_sec: 50.0
  screen_time_penalty_steepness: 0.10

hysteresis:
  min_dwell_seconds: 10
  swap_improvement_threshold: 0.10
  max_switches_per_cycle: 2
  max_switches_per_minute: 10
  removal_cooldown_seconds: 15
  sprint_min_dwell_seconds: 6

sticky_slots:
  - slot: 0
    driver: null
  - slot: 1
    driver: null

orchestrator:
  tick_interval_sec: 4.0
  dry_run: false
  manual_override_file: "/tmp/race_director_pause"
  startup_grace_ticks: 2

logging:
  level: "INFO"
  format: "console"
  file: null
